<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container containerbkg">

        <img src="bears.png" alt="Bären" class="bears">
        <div class="calculator" id="calculator">
            <div class="display" id="display">0</div>

            <button class="delete bearDelete" id="delete" data-action="clear"></button>


            <button class="bear7" data-num="7"></button>
            <button class="bear8" data-num="8"></button>
            <button class="bear9" data-num="9"></button>
            <button class="beardivide"data-action="operator">/</button>

            <button class="bear4" data-num="4"></button>
            <button class="bear5" data-num="5"></button>
            <button class="bear6" data-num="6"></button>
            <button class="bearmulti"data-action="operator">*</button>

            <button class="bear1" data-num="1"></button>
            <button class="bear2" data-num="2"></button>
            <button class="bear3" data-num="3"></button>
            <button class="bearminus" data-action="operator">-</button>

            <button class="bear0" data-num="0"></button>
            <button class="equal bearEqual" data-action="equal"></button>
            <button class="bearplus" data-action="operator">+</button>



        </div>
    </div>
</body>

</html>
